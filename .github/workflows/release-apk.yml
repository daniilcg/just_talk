name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build debug APK
        working-directory: android
        run: |
          # Fix Windows line endings if present
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew
          set -o pipefail
          ./gradlew --no-daemon assembleDebug --stacktrace --info 2>&1 | tee ../gradle-build.log

      - name: Rename APK
        run: |
          mkdir -p dist
          APK_PATH="$(ls android/app/build/outputs/apk/debug/*.apk | head -n 1)"
          cp "$APK_PATH" "dist/justtalk-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true

      - name: Upload Gradle log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log

