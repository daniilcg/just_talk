<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="160" y1="140" x2="864" y2="884" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.35" stop-color="#F6F3FF"/>
      <stop offset="0.7" stop-color="#F1FBFF"/>
      <stop offset="1" stop-color="#FFF7EE"/>
    </linearGradient>

    <linearGradient id="g" x1="260" y1="260" x2="780" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D28FF"/>
      <stop offset="0.38" stop-color="#18C6FF"/>
      <stop offset="0.68" stop-color="#00D26A"/>
      <stop offset="1" stop-color="#FF8A00"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#141A33" flood-opacity="0.16"/>
    </filter>

    <linearGradient id="shine" x1="320" y1="280" x2="700" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="bubbleShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#141A33" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="96" y="96" width="832" height="832" rx="190" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="240" y="240" width="544" height="544" rx="160" fill="url(#g)"/>
    <rect x="262" y="262" width="500" height="190" rx="95" fill="url(#shine)"/>

    <g filter="url(#bubbleShadow)">
      <rect x="340" y="404" width="344" height="232" rx="92" fill="#FFFFFF" opacity="0.98"/>
      <path d="M 456 636 L 404 706 L 404 636 Z" fill="#FFFFFF" opacity="0.98"/>

      <circle cx="430" cy="520" r="20" fill="#141A33" opacity="0.26"/>
      <circle cx="512" cy="520" r="20" fill="#141A33" opacity="0.26"/>
      <circle cx="594" cy="520" r="20" fill="#141A33" opacity="0.26"/>
    </g>
  </g>
</svg>
